{% extends "base.html" %}
{% block content %}

<div class="auth-wrap">
    <div class="auth-box">
        <div class="auth-title">Welcome back</div>
        <div class="auth-subtitle">Sign in to your Internship Tracker account.</div>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary auth-submit">Login</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="{% url 'signup' %}">Sign up free</a>
        </div>
    </div>
</div>

{% endblock %}
