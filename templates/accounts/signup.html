{% extends "base.html" %}
{% block content %}

<div class="auth-wrap">
    <div class="auth-box">
        <div class="auth-title">Create account</div>
        <div class="auth-subtitle">Start tracking your internship applications today.</div>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary auth-submit">Sign Up</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </div>
    </div>
</div>

{% endblock %}
